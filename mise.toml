# mise is the single source of truth for the toolchain and all project commands.
# A fresh machine gets working with `mise install`. Every command CLAUDE.md, hk
# hooks, and CI invoke is a task defined here, so behavior is identical everywhere.

[tools]
zig = "0.16.0"
zls = "0.16.0"
hk = "1.50.0"

[env]
# Make hk run every tool through mise-managed versions.
HK_MISE = "1"

[hooks]
# Self-install git hooks for anyone who runs `mise install`.
postinstall = "hk install --mise"

[tasks.build]
description = "Compile the engine + runner (native target)."
run = "zig build"

[tasks.test]
# `--error-style minimal` (a documented `zig build` flag): the default `verbose`
# style prints a `failed command: ... --listen=-` line for the test-runner step
# whenever it wrote ANY stderr (e.g. an in-test `std.log.warn`) — even on a
# fully green run (issue #169). `minimal` drops only that command-line-echo
# tail; the actual stderr content, error bundles, per-test fail counts, and the
# non-zero exit code on a real failure are all printed unconditionally and
# stay exactly as loud (verified: a deliberately broken test still exits 2
# with the full assertion message and a "Build Summary: ... 1 failed" line).
description = "Run all unit + integration tests."
run = "zig build test --error-style minimal"

[tasks.test-lua]
# Without `-Denable-lua`, `script_api_version == 0` and every test in
# `tests/acceptance_scenarios.zig` (the pacman/snake acceptance staircase, ADR 0028
# layer 2) hits `requireLua()`'s early `error.SkipZigTest` — the plain `test` task
# above only compiles the staircase, it never actually executes a single step
# (issue #163). This pass turns those skips into real runs: same test suite, Lua
# backend compiled in, so the staircase (and the Lua-gated `script`/`lua.zig`
# backend tests) genuinely execute instead of silently no-opping behind a green gate.
description = "Run all tests with the Lua scripting backend enabled — executes the pacman/snake acceptance staircase instead of skipping it."
run = "zig build -Denable-lua test --error-style minimal"

[tasks.fmt]
# `--exclude zig-pkg`: fetched dependency sources (e.g. ziglua's vendored Lua
# bindings) are not fmt-clean and are not ours to format. zig eagerly fetches even
# lazy deps into zig-pkg/, and `zig fmt` recurses into it, so it must be excluded.
description = "Format all Zig sources in place (zig fmt is law)."
run = "zig fmt --exclude zig-pkg ."

[tasks.fmt-check]
description = "Verify formatting without writing (fails loudly on drift)."
run = "zig fmt --check --exclude zig-pkg ."

[tasks.check]
# Runs both test passes: plain `test` (Lua compiled out, ~everything else) and
# `test-lua` (`-Denable-lua`) — the latter is what actually executes the pacman/snake
# acceptance staircase in `tests/acceptance_scenarios.zig` instead of skipping it
# (issue #163). Both are part of the canonical green gate; a merge is not clean
# unless the staircase genuinely ran and passed.
description = "Full gate: fmt-check + build + test + test-lua. The canonical green check."
depends = ["fmt-check", "build", "test", "test-lua"]

[tasks.run]
description = "Run the runner headless: mise run run -- games/sandbox"
# Depends on `assets` so a game's declared sprite sheets (DERIVED, gitignored) always
# exist on disk before the runner loads them — a fresh checkout that never ran `mise run
# assets` otherwise renders a sprited entity with no sheet (issue #121). The engine also
# falls back to the flat Appearance quad for a missing sheet, so a direct `zig build run`
# stays visible too; this just makes the normal path show the correct sprite.
depends = ["assets"]
run = "zig build run --"

[tasks.cross-win]
description = "Cross-compile for x86_64-windows (portability gate)."
run = "zig build -Dtarget=x86_64-windows"

[tasks.spritegen]
# The genre-neutral procedural sprite generator (ADR 0031). Reads a ZON sprite recipe,
# writes a DERIVED `.msf` sheet + preview PNG into <out-dir> (never committed). Single
# cross-platform `zig build` invocation — works identically on Linux and Windows.
description = "Generate a sprite sheet from a recipe: mise run spritegen -- <recipe.zon> <out-dir>"
run = "zig build spritegen --"

[tasks.assets]
# (Re)generate every committed sprite recipe into its gitignored generated/ dir. This
# is how Lane B's engine/--play obtains sheets — a build-time generate from committed
# recipes, not a committed binary. Add a line here per new recipe.
description = "(Re)generate all sprite sheets from committed recipes into gitignored generated/ dirs."
run = [
    "zig build spritegen -- games/pacman/sprites/pac.zon games/pacman/sprites/generated",
    "zig build spritegen -- games/pacman/sprites/ghost.zon games/pacman/sprites/generated",
    "zig build spritegen -- games/snake/sprites/head.zon games/snake/sprites/generated",
    "zig build spritegen -- games/snake/sprites/segment.zon games/snake/sprites/generated",
    "zig build spritegen -- games/snake/sprites/food.zon games/snake/sprites/generated",
]

[tasks.msfpreview]
# Headless animated previewer (issue #129, phase 1): given a generated `.msf`, renders
# every clip's authored + mirror-inferred facings/frames into one filmstrip PNG, reusing
# the real engine sprite pipeline (facing/mirror resolution + the CPU atlas-sampling
# rasterizer) — no GUI, no new dependency. Run `mise run assets` first so the `.msf`
# exists. Single cross-platform `zig build` invocation.
description = "Preview an .msf's clips/facings as a filmstrip PNG: mise run msfpreview -- <sheet.msf> <out-dir>"
run = "zig build msfpreview --"

[tasks.shaders]
description = "Recompile WGSL shaders to committed SPIR-V via mise-pinned naga."
run = [
    "mise x cargo:naga-cli@30.0.0 -- naga src/gpu/vulkan/shaders/scene.wgsl src/gpu/vulkan/shaders/scene.spv",
    "mise x cargo:naga-cli@30.0.0 -- naga src/gpu/vulkan/shaders/sprite.wgsl src/gpu/vulkan/shaders/sprite.spv",
]
