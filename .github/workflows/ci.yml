name: ci

on:
  push:
    branches: [main]
  pull_request:

# This workflow contains no logic. All real behavior lives in mise tasks and
# hk.pkl, so the same checks run identically on dev machines, git hooks, and any
# CI provider. Switching forges (Forgejo/Codeberg, GitLab, Woodpecker) means
# rewriting only this ~20-line file — nothing else. hk's pre-push hook already
# runs the full suite locally; CI is a second opinion, not the gatekeeper.
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise install
      - run: hk check --all
      - run: mise run check
      - run: mise run cross-win

  # Additive to `check` above (which never passes `-Denable-vulkan`, so the Vulkan
  # backend and its cross-backend orientation test — gpu.zig, "captureFrame: atlas
  # top row composites to the output top" — never actually execute in the main
  # gate, only compile). The test logic lives in the `test-vulkan` mise task (runnable
  # on any forge or a dev box with a Vulkan ICD); this job only provisions the
  # runner-specific bits that legitimately belong in the workflow: Mesa lavapipe (a
  # software Vulkan ICD, no GPU hardware required) and the ICD env var pointing the
  # loader at it. So the invariant is verified on every push/PR, not just locally
  # (issue #157; the `link_libc` fix this job depends on is issue #181).
  vulkan-lavapipe:
    runs-on: ubuntu-latest
    env:
      # Restrict the loader to lavapipe (the runner has no GPU). Mesa on Ubuntu Noble
      # names the manifest `lvp_icd.json` (no `.x86_64` arch suffix — that naming only
      # exists in some other distros' mesa packaging), so the arch-suffixed path is a
      # non-existent file: the loader then finds zero ICDs and vkCreateInstance returns
      # VK_ERROR_INCOMPATIBLE_DRIVER (issue #187).
      VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise install
      - name: Install Mesa lavapipe (software Vulkan ICD)
        run: sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers libvulkan1 vulkan-tools
      - run: mise run test-vulkan
